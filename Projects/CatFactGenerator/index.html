<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purr-fect Cat Facts</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="card">
            <div class="img-container">
                <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" alt="Cute Cat" class="cat-illustration">
            </div>
            
            <h1>Cat Fact Generator</h1>
            
            <div class="fact-box">
                <p class="para">Click the button below to learn something new about cats!</p>
            </div>

            <button id="btn">Show New Fact</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
